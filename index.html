<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover"
    />
    <title>Claudius</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,100..900;1,100..900&family=Syne:wght@400..800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --border: 0 0% 16%;
        --input: 0 0% 10%;
        --ring: 0 0% 100%;
      }

      body {
        background-color: #050505;
        color: #F5F5F5;
        -webkit-font-smoothing: antialiased;
      }

      .glass {
        background: rgba(37, 37, 35, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(28, 28, 26, 0.05);
      }

      /* Hide scrollbar */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
          "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
          "react": "https://esm.sh/react@^19.2.3",
          "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client",
          "recharts": "https://esm.sh/recharts@^3.7.0",
          "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
          "react/": "https://esm.sh/react@^19.2.3/"
        }
      }
    </script>
    <link rel="stylesheet" href="/index.css" />
  </head>
  <body class="bg-[#050505] text-[#F5F5F5] font-body">
    <div id="root"></div>
